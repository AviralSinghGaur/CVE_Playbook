<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud SecOps Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { sidebar: '#0f172a', surface: '#1e293b', border: '#334155' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
    @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
    .toast-enter{animation:slideIn .35s ease forwards}
    .toast-exit{animation:slideOut .35s ease forwards}
    .nav-link.active{background-color:#1e40af;color:#fff}
    .tab-btn.active{background-color:#2563eb;color:#fff}
    .check-icon{display:none}
    input.custom-check:checked + label .check-box{background-color:#16a34a;border-color:#16a34a}
    input.custom-check:checked + label .check-icon{display:block}
    .cve-card{transition:transform .15s,box-shadow .15s}
    .cve-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .25s ease forwards}
  </style>
</head>
<body class="bg-slate-900 text-slate-200 flex h-screen overflow-hidden font-sans">

<!-- SIDEBAR -->
<aside class="w-60 flex-shrink-0 bg-sidebar flex flex-col border-r border-border overflow-y-auto">

    <a onclick="showLibrary()" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-800 cursor-pointer transition-colors">

<!-- MAIN -->

// ─── TOAST ───────────────────────────────────────────────────
let _tc = 0;
function showToast(msg, icon='fa-circle-check', dur=3500) {
  const c = document.getElementById('toast-container');
  const id = 'toast-' + (++_tc);
  const d = document.createElement('div');
  d.id = id;
  d.className = 'toast-enter pointer-events-auto flex items-center gap-3 bg-green-800 border border-green-600 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl max-w-xs';
  d.innerHTML = `<i class="fa-solid ${icon} text-green-300 flex-shrink-0"></i><span class="flex-1">${msg}</span><button onclick="dismissToast('${id}')" class="text-green-300 hover:text-white ml-1"><i class="fa-solid fa-xmark text-xs"></i></button>`;
  c.appendChild(d);
  d._t = setTimeout(() => dismissToast(id), dur);
}
function dismissToast(id) {
  const d = document.getElementById(id);
  if (!d) return;
  clearTimeout(d._t);
  d.classList.replace('toast-enter','toast-exit');
  d.addEventListener('animationend', () => d.remove(), { once: true });
}

// ─── LIBRARY VIEW ────────────────────────────────────────────
function showLibrary() {
  setActiveNav(0);
  document.getElementById('header-breadcrumb').innerHTML = `
    <h1 class="text-lg font-bold text-white">CVE Playbook Library</h1>
    <p class="text-xs text-slate-400 mt-0.5">Select a playbook to begin remediation</p>`;
  document.getElementById('search-input').value = '';
  renderLibrary(CVES);
  showToast('CVE Library loaded', 'fa-layer-group');
}

function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = CVES.filter(c =>
    c.id.toLowerCase().includes(q) ||
    c.title.toLowerCase().includes(q) ||
    c.category.toLowerCase().includes(q) ||
    c.severity.includes(q)
  );
  renderLibrary(filtered);
}

function renderLibrary(list) {
  const body = document.getElementById('main-body');
  const stats = {
    critical: CVES.filter(c => c.severity === 'critical').length,
    high: CVES.filter(c => c.severity === 'high').length,
    total: CVES.reduce((a,c) => a + c.affected, 0),
    resolved: CVES.reduce((a,c) => a + c.resolved, 0),

        </div>
        <span class="px-2 py-0.5 rounded-full ${s.bg} border ${s.border} ${s.text} text-xs font-bold uppercase flex-shrink-0">${s.label}</span>

      <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed">${c.description}</p>
      <div class="flex items-center justify-between text-xs text-slate-500">
        <span class="flex items-center gap-1.5"><i class="fa-solid fa-tag"></i>${c.category}</span>
        <span class="flex items-center gap-1.5"><i class="fa-solid fa-gauge-high"></i>CVSS ${c.cvss}</span>
        <span class="flex items-center gap-1.5"><i class="fa-solid fa-clock"></i>${c.sla}d SLA</span>
      </div>
      <div>
        <div class="flex justify-between text-xs text-slate-500 mb-1">
          <span>Remediation</span><span>${c.resolved}/${c.affected} nodes</span>
        </div>
        <div class="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden">
          <div class="h-full ${pct === 100 ? 'bg-green-500' : pct > 60 ? 'bg-blue-500' : 'bg-red-500'} rounded-full" style="width:${pct}%"></div>

        <span class="text-xs text-blue-400 font-semibold flex items-center gap-1">Open Playbook <i class="fa-solid fa-arrow-right"></i></span>

  body.innerHTML = `<div class="fade-in space-y-6">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-surface border border-border rounded-xl p-4">

        <p class="text-xs text-slate-500 mt-1">Active playbooks</p>
      </div>
      <div class="bg-surface border border-border rounded-xl p-4">
        <p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Critical</p>
        <p class="text-2xl font-bold text-red-400">${stats.critical}</p>
        <p class="text-xs text-red-500 mt-1"><i class="fa-solid fa-arrow-up"></i> Immediate action</p>
      </div>
      <div class="bg-surface border border-border rounded-xl p-4">
        <p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Affected Nodes</p>
        <p class="text-2xl font-bold text-white">${stats.total}</p>
        <p class="text-xs text-slate-500 mt-1">Across all CVEs</p>
      </div>
      <div class="bg-surface border border-border rounded-xl p-4">
        <p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Resolved</p>
        <p class="text-2xl font-bold text-green-400">${stats.resolved}</p>
        <p class="text-xs text-green-600 mt-1">${Math.round(stats.resolved/stats.total*100)}% of fleet</p>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">${cards || '<p class="text-slate-500 col-span-3 text-center py-12">No CVEs match your search.</p>'}</div>
  </div>`;
}

// ─── PLAYBOOK VIEW ───────────────────────────────────────────
function showPlaybook(id) {
  const c = CVES.find(x => x.id === id);
  if (!c) return;
  const s = SEV[c.severity];
  const pct = Math.round((c.resolved / c.affected) * 100);
  const pending = c.affected - c.resolved;

  document.getElementById('header-breadcrumb').innerHTML = `
    <div class="flex items-center gap-2">
      <button onclick="showLibrary()" class="text-slate-400 hover:text-white transition-colors text-sm flex items-center gap-1.5">
        <i class="fa-solid fa-arrow-left"></i> Library
      </button>
      <i class="fa-solid fa-chevron-right text-slate-600 text-xs"></i>
      <span class="text-sm text-slate-300 font-mono">${c.id}</span>
    </div>
    <h1 class="text-base font-bold text-white mt-0.5 truncate max-w-lg">${c.title}</h1>`;

  const checkItems = c.checklist.map((item, i) => `
    <div id="chk-row-${i}" class="checklist-item flex items-start gap-3 p-3 rounded-lg border border-border bg-slate-800/50 transition-colors">
      <input type="checkbox" id="chk${id}${i}" class="sr-only custom-check" onchange="handleCheckbox(this,'${item.label.replace(/'/g,"\\'")}',${i},'${id}')">
      <label for="chk${id}${i}" class="flex items-start gap-3 cursor-pointer w-full">
        <span class="check-box flex-shrink-0 mt-0.5 w-5 h-5 rounded border-2 border-slate-500 flex items-center justify-center transition-colors">
          <i class="fa-solid fa-check check-icon text-white text-xs"></i>
        </span>
        <div>
          <p class="text-sm font-semibold text-slate-200">${item.label}</p>
          <p class="text-xs text-slate-500 mt-0.5">${item.detail}</p>
        </div>
      </label>
    </div>`).join('');

  const planASteps = c.planA.steps.map(st => `
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">${st.heading}</p>
      <pre class="bg-slate-950 border border-border rounded-lg p-4 text-xs text-green-300 overflow-x-auto"><code>${st.code}</code></pre>
    </div>`).join('');

  const planBSteps = c.planB.steps.map(st => `
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">${st.heading}</p>
      <pre class="bg-slate-950 border border-border rounded-lg p-4 text-xs text-yellow-300 overflow-x-auto"><code>${st.code}</code></pre>
    </div>`).join('');

  document.getElementById('main-body').innerHTML = `
  <div class="fade-in space-y-6">

    <!-- Alert Banner -->
    <div id="pb-alert" class="${s.alertBg} border ${s.alertBorder} rounded-xl p-5 shadow-lg relative">
      <button onclick="document.getElementById('pb-alert').remove();showToast('Alert dismissed','fa-eye-slash')" class="absolute top-4 right-4 ${s.text} hover:text-white transition-colors">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-11 h-11 ${s.alertBg} border ${s.alertBorder} rounded-lg flex items-center justify-center">
          <i class="fa-solid fa-radiation ${s.text} text-xl"></i>
        </div>
        <div class="flex-1 min-w-0 pr-6">
          <div class="flex flex-wrap items-center gap-2 mb-1">
            <span class="px-2 py-0.5 ${s.bg} ${s.text} border ${s.border} text-xs font-bold rounded uppercase">${s.label}</span>
            <span class="px-2 py-0.5 bg-slate-800 text-slate-300 text-xs rounded font-mono">${c.id}</span>
            <span class="px-2 py-0.5 bg-slate-800 text-slate-400 text-xs rounded">${c.category}</span>
          </div>
          <h2 class="text-base font-bold ${s.alertText} mb-1">${c.title}</h2>
          <p class="text-sm ${s.alertSub} leading-relaxed mb-3">${c.description}</p>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div class="${s.alertStat} rounded-lg px-3 py-2"><p class="text-xs ${s.alertStatText} uppercase tracking-wide font-semibold">CVSS</p><p class="text-lg font-bold text-white">${c.cvss}</p></div>
            <div class="${s.alertStat} rounded-lg px-3 py-2"><p class="text-xs ${s.alertStatText} uppercase tracking-wide font-semibold">SLA</p><p class="text-sm font-bold text-white">${c.sla} Days</p></div>
            <div class="${s.alertStat} rounded-lg px-3 py-2"><p class="text-xs ${s.alertStatText} uppercase tracking-wide font-semibold">Affected</p><p class="text-sm font-bold text-white">${c.affected}</p></div>
            <div class="${s.alertStat} rounded-lg px-3 py-2"><p class="text-xs ${s.alertStatText} uppercase tracking-wide font-semibold">Due</p><p class="text-sm font-bold text-yellow-300">${c.due}</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-surface border border-border rounded-xl p-4"><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Affected</p><p class="text-2xl font-bold text-white">${c.affected}</p></div>
      <div class="bg-surface border border-border rounded-xl p-4"><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Resolved</p><p class="text-2xl font-bold text-green-400">${c.resolved}</p><p class="text-xs text-green-600 mt-1">${pct}% complete</p></div>
      <div class="bg-surface border border-border rounded-xl p-4"><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Pending</p><p class="text-2xl font-bold text-yellow-400">${pending}</p></div>
      <div class="bg-surface border border-border rounded-xl p-4"><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">SLA Days</p><p class="text-2xl font-bold text-orange-400">${c.sla}</p></div>
    </div>

    <!-- Flowchart + Checklist -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-surface border border-border rounded-xl p-5">
        <div class="flex items-center gap-2 mb-4">
          <i class="fa-solid fa-diagram-project text-blue-400"></i>
          <h3 class="text-sm font-bold text-white uppercase tracking-wide">Triage Workflow</h3>
        </div>
        <div class="mermaid flex justify-center" id="mermaid-${id.replace(/-/g,'')}">${c.mermaid}</div>
      </div>
      <div class="bg-surface border border-border rounded-xl p-5">
        <div class="flex items-center gap-2 mb-4">
          <i class="fa-solid fa-clipboard-check text-green-400"></i>
          <h3 class="text-sm font-bold text-white uppercase tracking-wide">Service Desk Checklist</h3>
        </div>
        <div class="space-y-3" id="checklist-${id}">${checkItems}</div>
        <div class="mt-5">
          <div class="flex justify-between text-xs text-slate-500 mb-1">
            <span>Completion</span><span id="prog-label-${id}">0 / ${c.checklist.length}</span>
          </div>
          <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
            <div id="prog-bar-${id}" class="h-full bg-green-500 rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Engineering Tabs -->
    <div class="bg-surface border border-border rounded-xl p-5">
      <div class="flex items-center gap-2 mb-4">
        <i class="fa-solid fa-terminal text-purple-400"></i>
        <h3 class="text-sm font-bold text-white uppercase tracking-wide">Engineering Remediation Playbook</h3>
      </div>
      <div class="flex gap-2 mb-5">
        <button id="tb-a-${id}" onclick="switchTab('a','${id}')"
          class="tab-btn active flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold border border-border transition-colors">
          <i class="fa-solid fa-bolt text-yellow-400"></i>Plan A: ${c.planA.title}
        </button>
        <button id="tb-b-${id}" onclick="switchTab('b','${id}')"
          class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold border border-border bg-slate-800 text-slate-400 transition-colors">
          <i class="fa-solid fa-wrench text-orange-400"></i>Plan B: ${c.planB.title}
        </button>
      </div>
      <div id="pane-a-${id}">
        <div class="flex items-start gap-3 p-3 mb-4 bg-green-950/50 border border-green-800 rounded-lg">
          <i class="fa-solid fa-circle-check text-green-400 mt-0.5"></i>
          <p class="text-sm text-green-300"><strong>Preferred path.</strong> ${c.planA.title}.</p>
        </div>
        <div class="space-y-4">${planASteps}</div>
      </div>
      <div id="pane-b-${id}" class="hidden">
        <div class="flex items-start gap-3 p-3 mb-4 bg-yellow-950/50 border border-yellow-800 rounded-lg">
          <i class="fa-solid fa-triangle-exclamation text-yellow-400 mt-0.5"></i>
          <p class="text-sm text-yellow-300"><strong>Use when Plan A is unavailable.</strong> ${c.planB.title}.</p>
        </div>
        <div class="space-y-4">${planBSteps}</div>
      </div>
    </div>

    <footer class="text-center text-xs text-slate-600 py-2">Cloud SecOps Portal &copy; 2026 — ${c.id} Playbook — Internal Use Only</footer>
  </div>`;

  // Re-run Mermaid on the new content
  mermaid.run({ querySelector: `#mermaid-${id.replace(/-/g,'')}` });
  showToast(`Opened ${c.id} playbook`, 'fa-book-open');
}

// ─── CHECKLIST ───────────────────────────────────────────────
function handleCheckbox(el, label, idx, cveId) {
  const row = document.getElementById(`chk-row-${idx}`);
  if (el.checked) {
    row.classList.add('border-green-700','bg-green-950/20');
    showToast(`✓ ${label}`, 'fa-circle-check');
  } else {
    row.classList.remove('border-green-700','bg-green-950/20');
  }
  const cve = CVES.find(c => c.id === cveId);
  const total = cve.checklist.length;
  const done = document.querySelectorAll(`#checklist-${cveId} .custom-check:checked`).length;
  document.getElementById(`prog-bar-${cveId}`).style.width = (done/total*100)+'%';
  document.getElementById(`prog-label-${cveId}`).textContent = `${done} / ${total}`;
  if (done === total) showToast('All steps complete! Ready to close ticket.', 'fa-flag-checkered');
}

// ─── TABS ─────────────────────────────────────────────────────
function switchTab(tab, id) {
  document.getElementById(`pane-a-${id}`).classList.toggle('hidden', tab !== 'a');
  document.getElementById(`pane-b-${id}`).classList.toggle('hidden', tab !== 'b');
  ['a','b'].forEach(t => {
    const btn = document.getElementById(`tb-${t}-${id}`);
    btn.classList.toggle('active', t === tab);
    btn.classList.toggle('bg-slate-800', t !== tab);
    btn.classList.toggle('text-slate-400', t !== tab);
  });
  showToast(`Switched to Plan ${tab.toUpperCase()}`, 'fa-book-open');
}

// ─── SIDEBAR ACTIVE STATE ────────────────────────────────────
function setActiveNav(idx) {
  document.querySelectorAll('.nav-link').forEach((el,i) => el.classList.toggle('active', i === idx));
}

// ─── INIT ─────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: { background:'#1e293b', primaryColor:'#1e293b', primaryTextColor:'#e2e8f0', primaryBorderColor:'#475569', lineColor:'#64748b', fontSize:'13px' },
  flowchart: { curve:'basis', padding:10 }
});
renderLibrary(CVES);
</script>
</body>
</html>
